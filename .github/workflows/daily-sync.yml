name: Daily Smart Support Bot Sync

on:
  schedule:
    # Runs at 00:00 UTC every day 
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t smart-support-bot .

      - name: Run Docker container
        env:
          ZENDESK_API_URL: ${{ secrets.ZENDESK_API_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -e ZENDESK_API_URL="$ZENDESK_API_URL" \
            -e OPENAI_API_KEY="$OPENAI_API_KEY" \
            smart-support-bot

      - name: Commit and push sync state
        run: |
          # Fix ownership of files created by Docker (since Docker runs as root by default)
          sudo chown -R $USER:$USER sync_state.json articles/ || true
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add sync_state.json articles/
          # Only commit and push if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update sync state and articles [skip ci]" && git push)
